apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "kafka-kraft.kafkaFullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{ include "kafka-kraft.labels" . | nindent 4 }}
    app: kafka
    release: {{ .Release.Name }}
spec:
  serviceName: {{ include "kafka-kraft.headlessServiceName" . }}
  replicas: {{ .Values.kafka.replicaCount }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: kafka
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: kafka
        release: {{ .Release.Name }}
    spec:
      securityContext:
        runAsUser: 0
      initContainers:
        - name: kafka-storage-format
          image: "{{ .Values.kafka.image.repository }}:{{ .Values.kafka.image.tag }}"
          imagePullPolicy: {{ .Values.kafka.image.pullPolicy }}
          command:
            - /bin/bash
            - -c
            - |
              set -e
              # meta.properties is written to metadata.log.dir, not log.dirs
              if [ -f /var/lib/kafka/metadata/meta.properties ]; then
                echo "[init] Storage already formatted — skipping."
                exit 0
              fi
              echo "[init] Formatting KRaft storage with cluster ID: ${CLUSTER_ID}"
              # kafka-storage format validates the full broker config — must include
              # process.roles, advertised.listeners (non-0.0.0.0), etc.
              # $HOSTNAME is available in init containers (same pod name as main container).
              FQDN="${HOSTNAME}.{{ include "kafka-kraft.headlessServiceName" . }}.{{ .Release.Namespace }}.svc.cluster.local"
              NODE_ID="${HOSTNAME##*-}"
              # log.dirs uses a subdirectory to avoid ext4 lost+found at the PVC root
              mkdir -p /var/lib/kafka/data/logs
              printf '%s\n' \
                'process.roles=broker,controller' \
                "node.id=${NODE_ID}" \
                "controller.quorum.voters=${NODE_ID}@localhost:9093" \
                'listeners=BROKER://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093' \
                "advertised.listeners=BROKER://${FQDN}:9092" \
                'inter.broker.listener.name=BROKER' \
                'controller.listener.names=CONTROLLER' \
                'listener.security.protocol.map=BROKER:PLAINTEXT,CONTROLLER:PLAINTEXT' \
                'log.dirs=/var/lib/kafka/data/logs' \
                'metadata.log.dir=/var/lib/kafka/metadata' \
                > /tmp/kraft.properties
              kafka-storage format \
                --cluster-id "${CLUSTER_ID}" \
                --config /tmp/kraft.properties \
                --ignore-formatted
              echo "[init] KRaft storage format complete."
          env:
            - name: CLUSTER_ID
              valueFrom:
                configMapKeyRef:
                  name: {{ include "kafka-kraft.clusterIdConfigMapName" . }}
                  key: clusterId
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
            - name: metadata
              mountPath: /var/lib/kafka/metadata
      containers:
        - name: kafka
          image: "{{ .Values.kafka.image.repository }}:{{ .Values.kafka.image.tag }}"
          imagePullPolicy: {{ .Values.kafka.image.pullPolicy }}
          command:
            - /bin/bash
            - -c
            - |
              # Extract ordinal from StatefulSet pod name: kafka-0 → 0
              export KAFKA_NODE_ID="${HOSTNAME##*-}"
              # Advertised listeners must include this pod's FQDN
              export KAFKA_ADVERTISED_LISTENERS="BROKER://${HOSTNAME}.{{ include "kafka-kraft.headlessServiceName" . }}.{{ .Release.Namespace }}.svc.cluster.local:9092"
              exec /etc/confluent/docker/run
          env:
            # KRaft mode — no ZooKeeper
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: {{ include "kafka-kraft.quorumVoters" . | quote }}
            - name: KAFKA_LISTENERS
              value: "BROKER://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "BROKER:PLAINTEXT,CONTROLLER:PLAINTEXT"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "BROKER"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_LOG_DIRS
              value: "/var/lib/kafka/data/logs"
            - name: KAFKA_METADATA_LOG_DIR
              value: "/var/lib/kafka/metadata"
            # Cluster ID — read by the Confluent entrypoint for validation
            - name: CLUSTER_ID
              valueFrom:
                configMapKeyRef:
                  name: {{ include "kafka-kraft.clusterIdConfigMapName" . }}
                  key: clusterId
            # Static config properties
            {{- range $k, $v := .Values.kafka.config }}
            - name: KAFKA_{{ $k | upper | replace "." "_" }}
              value: {{ $v | quote }}
            {{- end }}
          ports:
            - name: broker
              containerPort: 9092
            - name: controller
              containerPort: 9093
          resources:
            {{- toYaml .Values.kafka.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 6
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
            - name: metadata
              mountPath: /var/lib/kafka/metadata
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.kafka.storage.class | quote }}
        resources:
          requests:
            storage: {{ .Values.kafka.storage.size }}
    - metadata:
        name: metadata
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.kafka.storage.class | quote }}
        resources:
          requests:
            storage: 1Gi
