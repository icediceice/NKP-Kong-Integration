{{- if .Values.schemaRegistry.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kafka-kraft.srLbServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{ include "kafka-kraft.labels" . | nindent 4 }}
    app: schema-registry
    release: {{ .Release.Name }}
spec:
  type: LoadBalancer
  selector:
    app: schema-registry
    release: {{ .Release.Name }}
  ports:
    - name: http
      port: 8081
      targetPort: 8081
{{- end }}
