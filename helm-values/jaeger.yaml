# =============================================================================
# Jaeger — Distributed Tracing
# Static Helm overrides. Dynamic values (strategy, service type, storage)
# are applied as --set flags from scripts/install-jaeger.sh.
# Chart: jaegertracing/jaeger
# =============================================================================

# AllInOne — single-pod deployment, in-memory storage (POC default, JAEGER_STRATEGY=allInOne)
allInOne:
  image:
    tag: "1.57.0"
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  # Expose gRPC (OTLP), Thrift HTTP, and Jaeger UI
  extraEnv:
    - name: COLLECTOR_OTLP_ENABLED
      value: "true"

# Query UI — used in production strategy (JAEGER_STRATEGY=production)
query:
  replicaCount: 1
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

# Collector — used in production strategy
collector:
  replicaCount: 1
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  extraEnv:
    - name: COLLECTOR_OTLP_ENABLED
      value: "true"

# Agent is deprecated in Jaeger 1.35+ — use OTLP directly to collector instead
agent:
  enabled: false
