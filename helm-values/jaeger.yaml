# =============================================================================
# Jaeger v2 — Distributed Tracing
# Chart: jaegertracing/jaeger v4.x  (appVersion: Jaeger 2.x)
#
# Jaeger v2 is a single binary (no separate collector/query/agent pods).
# All components — receiver, storage, query UI — run in one deployment.
# Default storage is in-memory. For persistent storage, provide a userconfig
# pointing to an external Elasticsearch (see JAEGER_STRATEGY=production notes
# in config.env.example).
#
# Static Helm overrides. Dynamic values (service type) are applied as --set
# flags from scripts/install-jaeger.sh.
# =============================================================================

jaeger:
  replicas: 1
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# Disable ES maintenance jobs — not needed for in-memory or manually managed ES
spark:
  enabled: false

esIndexCleaner:
  enabled: false

esRollover:
  enabled: false

esLookback:
  enabled: false
