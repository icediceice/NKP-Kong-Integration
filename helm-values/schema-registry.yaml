# =============================================================================
# Schema Registry Helm Values — confluentinc/cp-schema-registry
#
# Schema Registry provides Avro/JSON/Protobuf schema management for Kafka.
# Kafka bootstrap and service type are overridden at install time via --set.
# =============================================================================

cp-schema-registry:
  # ---------------------------------------------------------------------------
  # Replica count — 1 for POC; increase for HA
  # ---------------------------------------------------------------------------
  replicaCount: 1

  # ---------------------------------------------------------------------------
  # Schema Registry port
  # ---------------------------------------------------------------------------
  servicePort: 8081

  # ---------------------------------------------------------------------------
  # Schema compatibility mode
  # BACKWARD: new schema can read old data (default, safe)
  # FULL: both forward and backward compatible
  # NONE: no compatibility checking
  # ---------------------------------------------------------------------------
  configurationOverrides:
    "schema.compatibility.level": "BACKWARD"
    "kafkastore.topic.replication.factor": "1"

  # ---------------------------------------------------------------------------
  # Resources
  # ---------------------------------------------------------------------------
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

  # JMX exporter disabled — avoids dependency on pinned image SHA that may be unavailable
  prometheus:
    jmx:
      enabled: false
