# =============================================================================
# Confluent Platform Helm Values — confluentinc/cp-helm-charts umbrella chart
#
# Deploys: ZooKeeper + Kafka + (optionally) Schema Registry + Control Center
# Note: The cp-helm-charts chart uses ZooKeeper mode. KRaft is not supported.
#
# Dynamic values (broker count, image, storage, resources) are overridden
# via --set flags in install-kafka.sh. This file holds static config.
# =============================================================================

# ---------------------------------------------------------------------------
# ZooKeeper — required for Kafka coordination in this chart version
# ---------------------------------------------------------------------------
cp-zookeeper:
  enabled: true
  servers: 3
  securityContext:
    runAsUser: 0

# ---------------------------------------------------------------------------
# Kafka brokers
# Dynamic values (brokers, image, imageTag, storage, resources) set via --set
# ---------------------------------------------------------------------------
cp-kafka:
  enabled: true

  securityContext:
    runAsUser: 0

  configurationOverrides:
    "offsets.topic.replication.factor": "3"
    "default.replication.factor": "3"
    "min.insync.replicas": "1"
    "log.retention.hours": "168"
    "log.segment.bytes": "1073741824"
    "num.partitions": "1"

  persistence:
    enabled: true

  prometheus:
    jmx:
      enabled: false

# Unused components — disabled at install time via --set
cp-kafka-rest:
  enabled: false

cp-kafka-connect:
  enabled: false

cp-ksql-server:
  enabled: false
