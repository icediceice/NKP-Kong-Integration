# =============================================================================
# Confluent Control Center Helm Values — cp-control-center sub-chart
# Part of confluentinc/cp-helm-charts umbrella chart.
#
# Note: requires a Confluent Platform license; runs in 30-day trial without one.
# =============================================================================

cp-control-center:
  replicaCount: 1

  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

  # JMX exporter disabled — avoids dependency on pinned image SHA that may be unavailable
  prometheus:
    jmx:
      enabled: false
